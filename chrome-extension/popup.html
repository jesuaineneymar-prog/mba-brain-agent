<!DOCTYPE html>
<html>
<head>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:380px; min-height:400px; background:#0a0a12; color:#f2f2fa; font-family:'Segoe UI',sans-serif; font-size:12px; }
.header { padding:12px 14px; border-bottom:1px solid rgba(192,0,28,0.2); display:flex; align-items:center; gap:8px; }
.header .logo { font-weight:900; color:#ff1a3c; font-size:14px; letter-spacing:1px; }
.header .sub { color:#505068; font-size:10px; }
.section { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.label { font-size:10px; font-weight:700; color:#9090aa; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
.row { display:flex; gap:6px; margin-bottom:8px; }
select, input, textarea {
  width:100%; padding:8px 10px; background:#141428; border:1px solid rgba(192,0,28,0.14);
  border-radius:6px; color:#f2f2fa; font-size:12px; outline:none; font-family:inherit;
}
textarea { resize:vertical; min-height:80px; }
.btn { padding:8px 16px; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; }
.btn-primary { background:linear-gradient(135deg,#c0001c,#800010); color:#fff; width:100%; padding:10px; font-size:13px; }
.btn-primary:hover { opacity:.9; }
.btn-primary:disabled { background:#333; color:#666; cursor:not-allowed; }
.btn-danger { background:transparent; border:1px solid #ff4444; color:#ff4444; padding:6px 12px; font-size:10px; }
.status-bar { display:flex; gap:10px; padding:8px 14px; background:#0e0e1c; }
.stat { display:flex; align-items:center; gap:4px; }
.stat .dot { width:6px; height:6px; border-radius:50%; }
.stat .dot.ok { background:#00c063; }
.stat .dot.no { background:#ff4444; }
.stat .dot.wait { background:#888; }
.log-area { max-height:180px; overflow-y:auto; padding:8px 14px; background:rgba(0,0,0,0.3); font-family:'Courier New',monospace; font-size:10px; }
.log-line { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.02); }
.log-line.ok { color:#00c063; }
.log-line.err { color:#ff6b6b; }
.log-line.info { color:#9090aa; }
.progress-bar { height:4px; background:#141428; border-radius:2px; overflow:hidden; margin:6px 14px; }
.progress-bar .fill { height:100%; background:linear-gradient(90deg,#c0001c,#ff1a3c); transition:width .3s; }
.mba-link { color:#3b82f6; font-size:10px; text-align:center; padding:8px; cursor:pointer; }
.mba-link:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">MBA</span>
  <span class="sub">DM SENDER</span>
</div>

<!-- Status -->
<div class="status-bar" id="statusBar">
  <div class="stat"><div class="dot wait" id="igDot"></div><span id="igLabel">IG: verificando...</span></div>
  <div class="stat"><div class="dot wait" id="fbDot"></div><span id="fbLabel">FB: verificando...</span></div>
  <div class="stat" style="margin-left:auto"><span id="profileCount">0 perfis</span></div>
</div>

<!-- Plataforma e Mensagem -->
<div class="section">
  <div class="label">Plataforma</div>
  <div class="row">
    <select id="platform">
      <option value="instagram">Instagram</option>
      <option value="facebook">Facebook</option>
      <option value="all">Todas (IG + FB)</option>
    </select>
  </div>
  <div class="label" style="margin-top:8px">Mensagem</div>
  <textarea id="message" placeholder="Escreve a mensagem para os DMs..."></textarea>
</div>

<!-- Perfis pendentes -->
<div class="section" id="profilesSection" style="display:none">
  <div class="label">Perfis para contactar: <span id="pendingCount">0</span></div>
  <div id="profileList" style="max-height:100px;overflow-y:auto;font-size:10px;color:#9090aa;"></div>
</div>

<!-- Botoes -->
<div class="section" style="display:flex;gap:6px">
  <button class="btn btn-primary" id="sendBtn" disabled style="flex:1">Carregar perfis...</button>
  <button class="btn btn-danger" id="stopBtn" style="display:none">PARAR</button>
</div>

<!-- Progress -->
<div id="progressSection" style="display:none">
  <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
  <div style="padding:4px 14px;display:flex;justify-content:space-between;font-size:10px;color:#9090aa">
    <span id="progressText">0/0</span>
    <span id="progressPercent">0%</span>
  </div>
</div>

<!-- Log -->
<div class="log-area" id="logArea"></div>

<!-- Link MBA -->
<div class="mba-link" id="mbaLink">Abrir MBA Brain Agent</div>

<script src="popup.js"></script>
</body>
</html>
